<!DOCTYPE html>
<html>
<head>
    <title>Register | Diabetes System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4 register-card">

        <!-- TITLE -->
        <h3 class="text-center fw-bold mb-2">🩺 Create Account</h3>
        <p class="text-center text-muted mb-3">
            Register to use the prediction system
        </p>

        <!-- MESSAGE -->
        {% if msg %}
        <div class="alert alert-warning text-center">
            {{ msg }}
        </div>
        {% endif %}

        <!-- FORM -->
        <form method="POST">

            <!-- NAME -->
            <label>Name</label>
            <input type="text" name="name" class="form-control" required>

            <!-- EMAIL -->
            <label class="mt-3">Email</label>
            <input type="email" name="email" class="form-control" required>

            <!-- USERNAME -->
            <label class="mt-3">Username</label>
            <input type="text" name="username" class="form-control" required>

            <!-- PASSWORD WITH TOGGLE -->
            <label class="mt-3">Password</label>
            <div class="input-group">
                <input type="password" id="regPass" name="password" class="form-control" required>
                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                    <i class="bi bi-eye"></i>
                </button>
            </div>

            <button class="btn btn-success w-100 mt-4">Register</button>

        </form>

        <!-- LOGIN LINK -->
        <p class="text-center mt-3">
            Already have an account?
            <a href="/" class="fw-bold text-decoration-none">
                Login
            </a>
        </p>

    </div>

</div>

<!-- JS -->
<script>
function togglePassword() {
    const pass = document.getElementById("regPass");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
