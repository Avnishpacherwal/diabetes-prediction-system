<!DOCTYPE html>
<html>
<head>
    <title>Setup Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">

<div class="card p-4 shadow" style="width:350px">

    <h4 class="text-center mb-3">Complete Your Profile</h4>

    <form method="POST">

        <input type="number" name="age" class="form-control mb-3" placeholder="Enter Age" required>

        <select name="gender" class="form-control mb-3" required>
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
        </select>

        <button class="btn btn-primary w-100">Continue</button>

    </form>

</div>

</body>
</html>
