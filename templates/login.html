<!DOCTYPE html>
<html>
<head>
    <title>Login | Diabetes System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg p-4 login-card">

        <!-- TITLE -->
        <h3 class="text-center mb-2 fw-bold">🩺 Diabetes System</h3>
        <p class="text-center text-muted mb-3">Login to your account</p>

        <!-- ERROR MESSAGE -->
        {% if msg %}
        <div class="alert alert-danger text-center">
            {{ msg }}
        </div>
        {% endif %}

        <!-- FORM -->
        <form method="POST">

            <!-- Username or Email -->
            <div class="mb-3">
                <label class="form-label">Username or Email</label>
                <input type="text" name="username" class="form-control" placeholder="Enter username or email" required>
            </div>

            <!-- Password + Eye Button -->
            <div class="mb-3">
                <label class="form-label">Password</label>

                <div class="input-group">
                    <input type="password" name="password" id="loginPass" class="form-control" required>

                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                        <i class="bi bi-eye"></i>
                    </button>
                </div>
            </div>

            <!-- Button -->
            <button class="btn btn-primary w-100 fw-bold">
                Login
            </button>

        </form>

        <!-- Register -->
        <p class="text-center mt-3">
            New user?
            <a href="/register" class="fw-bold text-decoration-none">
                Register
            </a>
        </p>

    </div>

</div>

<!-- JS -->
<script>
function togglePassword() {
    const pass = document.getElementById("loginPass");
    pass.type = pass.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
